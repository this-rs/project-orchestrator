# cargo-deny configuration — supply chain guardrail.
# https://embarkstudios.github.io/cargo-deny/
#
# Run locally: `cargo deny check`
# Run in CI:   .github/workflows/security.yml
#
# Plan e81fb4de — Dependabot security audit (T7). Migrated from
# v1 schema (`vulnerability = "deny"`, `unlicensed = "deny"`, etc.,
# deprecated in cargo-deny ≥0.14) to the v2 schema.

[advisories]
version = 2
# Refuse to build if any dep version is yanked from crates.io.
yanked = "deny"
# When a known advisory has no actionable fix yet, document the
# exception with an explanatory comment + GHSA id below.
ignore = []

[bans]
# Same crate at multiple versions in the lockfile bloats binary
# size and complicates security scanning. Warn (don't deny — many
# version splits come from upstream we can't control).
multiple-versions = "warn"
# Wildcard version reqs (`= "*"`) defeat semver constraints.
wildcards = "warn"

[licenses]
version = 2
# Permissive licenses we accept. Audit before adding new ones.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "Zlib",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "BSL-1.0",
    "OpenSSL",
]
confidence-threshold = 0.93

# `ring` is dual-licensed but doesn't always declare it cleanly in
# its crate metadata; clarify so the licenses check passes.
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[sources]
# Refuse arbitrary alternative crates registries.
unknown-registry = "deny"
# Allow a small set of trusted git sources.
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://github.com/this-rs/nexus.git",
]
