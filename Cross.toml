# Cross-compilation configuration for cross-rs
# https://github.com/cross-rs/cross
#
# For cross-compiled targets, we use vendored OpenSSL (built from source)
# to avoid conflicts between host and target libssl-dev packages.
# See Cargo.toml `vendored-openssl` feature.

[target.x86_64-unknown-linux-gnu]
# x86_64 is now built natively (use_cross: false) — this section is kept
# as fallback in case cross is ever re-enabled.
pre-build = ["apt-get update && apt-get install -y libssl-dev pkg-config"]

[target.aarch64-unknown-linux-gnu]
# Two OpenSSL strategies coexist here:
# - HOST build scripts: use system libssl-dev (x86_64) — needed because
#   Cargo resolver v2 does NOT unify features between build-deps and normal deps,
#   so the vendored feature only applies to TARGET, not HOST.
# - TARGET binary: uses vendored OpenSSL (--features vendored-openssl) built
#   from source via openssl-src — avoids needing libssl-dev:arm64 which would
#   put arm64 .so in the HOST linker path and cause arch conflicts.
# perl + make are required by openssl-src for the vendored TARGET build.
pre-build = ["apt-get update && apt-get install -y libssl-dev pkg-config perl make"]

[target.aarch64-unknown-linux-gnu.env]
# Pass through ORT_LIB_LOCATION + ORT_PREFER_DYNAMIC_LINK so ort-sys uses
# the pre-downloaded Microsoft ONNX Runtime instead of downloading from pyke.io
# (which fails silently inside cross containers).
passthrough = ["ORT_LIB_LOCATION", "ORT_PREFER_DYNAMIC_LINK"]
